url: https://tgerke.github.io/dplyneage/
template:
  bootstrap: 5

navbar:
  structure:
    left: [intro, reference, articles, news]
    right: [search, github]

articles:
  - title: Getting Started
    navbar: ~
    contents:
    - getting-started
  - title: Integrations
    contents:
    - ducklake-lineage
  - title: Configuration
    contents:
    - python-integration
    - building-reactflow

reference:
  - title: Main Functions
    desc: >
      Core functions for extracting and visualizing lineage
    contents:
    - extract_lineage
    - lineage_flow
    - lineage_example
    - lineage_flow-shiny
  
  - title: Working with Lineage
    desc: >
      Query, compare, and traverse extracted lineage as plain data
    contents:
    - lineage_edges
    - lineage_tables
    - lineage_upstream
    - lineage_diff

  - title: Manual Lineage Creation
    desc: >
      Functions for manually creating lineage visualizations
    contents:
    - create_table_node
    - create_column_edge

  - title: Export
    desc: >
      Serialize lineage to interchange formats for graph tools, CI, and
      data catalogs
    contents:
    - lineage_json
    - lineage_graphml
    - lineage_mermaid

  - title: Python Integration
    desc: >
      Python (sqlglot) is only used for raw SQL input and is provisioned
      automatically; this helper checks availability
    contents:
    - has_sqlglot

  - title: Bundle Management
    desc: >
      The React Flow bundle ships pre-built; this helper checks it exists
    contents:
    - has_bundle

